],

},

/* ===================================================== */

type:"Bài tập trung bình",

"$1$",
"$2$",
"$3$"

{

],

},

{

level:"medium",
question:"Hàm nào sau đây không thỏa điều kiện Lagrange trên $[-1,1]$?",

"$|x|$",
"$x^3$",
"$x+1$"
],

explain:"$|x|$ không khả vi tại 0.",
tip:"Hãy kiểm tra điểm gãy."
},

{
type:"Bài tập trung bình",
level:"medium",
question:"Theo Lagrange, tồn tại c sao cho:",
options:[
"$f(c)=0$",
"$f'(c)=f(c)$",
"$f'(c)=\\dfrac{f(b)-f(a)}{b-a}$",

question:"Cho $f(x)=e^x$ trên $[0,1]$. Khi đó:",

],

"$3$"
],

],

{
type:"Bài tập khó",
level:"hard",
question:"Định lý Lagrange là cầu nối giữa:",
options:[
"Tích phân và ma trận",
"Trung bình và tức thời",
"Hình học và đại số",
"Vector và ma trận"
],

const container = document.getElementById("questions");

questions.forEach((q,index)=>{

    let levelClass = q.level;

    let html = `
    <div class="question">
        <div class="level ${levelClass}">
            ${q.type.toUpperCase()}
        </div>

        <h3>Câu ${index+1}. ${q.question}</h3>
    `;

    q.options.forEach((opt,i)=>{
        html += `
        <div class="option" onclick="checkAnswer(this,${i},${q.correct},'answer${index}')">
            ${String.fromCharCode(65+i)}. ${opt}
        </div>
        `;
    });

    html += `
        <div class="answer-box" id="answer${index}">
            <b>✅ Đáp án đúng:</b> ${String.fromCharCode(65+q.correct)} <br><br>

            <b>📘 Giải thích:</b><br>
            ${q.explain}

            <div class="tip">
                <b>⚡ Mẹo làm nhanh:</b><br>
                ${q.tip}
            </div>
        </div>

    </div>
    `;

    container.innerHTML += html;

});

function checkAnswer(element,selected,correct,id){

    let parent = element.parentElement;
    let options = parent.querySelectorAll(".option");

    options.forEach(opt=>{
        opt.style.pointerEvents="none";
    });

    if(selected===correct){
        element.classList.add("correct");
    }else{
        element.classList.add("wrong");
        options[correct].classList.add("correct");
    }

    document.getElementById(id).style.display="block";

    if(window.MathJax){
        MathJax.typesetPromise();
    }
}

function downloadHTML(){

    const htmlContent = document.documentElement.outerHTML;

    const blob = new Blob([htmlContent], {type:"text/html"});

    const a = document.createElement("a");

    a.href = URL.createObjectURL(blob);

    a.download = "de-thi-lagrange-tuong-tac.html";

    a.click();
}

</script>
